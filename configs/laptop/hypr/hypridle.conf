# ─────────────────────────────────────────
# hyprland-ricing by occhi
# ~/.config/hypr/hypridle.conf
# ─────────────────────────────────────────
# Adapted for: laptop (batería + panel interno)
# Dependencies: hypridle, playerctl, hyprlock
# Install:      pacman -S hypridle playerctl

general {
    lock_cmd             = hyprlock              # era "none" — ahora bloquea antes de dormir
    before_sleep_cmd     = hyprlock              # bloquea al suspender (ej: cerrar tapa)
    after_sleep_cmd      = hyprctl dispatch dpms on
    ignore_dbus_inhibit  = false
}

# Paso 1 — bloquear pantalla a los 4 minutos
listener {
    timeout    = 240
    on-timeout = bash -c 'playerctl status 2>/dev/null | grep -q Playing || hyprlock'
    on-resume  = hyprctl dispatch dpms on
}

# Paso 2 — apagar panel a los 5 minutos (1 min después del lock)
listener {
    timeout    = 300
    on-timeout = bash -c 'playerctl status 2>/dev/null | grep -q Playing || hyprctl dispatch dpms off'
    on-resume  = hyprctl dispatch dpms on
}

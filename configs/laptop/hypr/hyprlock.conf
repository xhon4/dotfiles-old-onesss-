# ─────────────────────────────────────────
# hyprland-ricing by occhi
# ~/.config/hypr/hyprlock.conf
# ─────────────────────────────────────────
# Adapted for: 1366x768

# BACKGROUND
background {
    monitor =
    path   = ~/wallpapers/wallpaper.jpg
    color  = rgb(12, 11, 5)

    blur_passes = 1
    blur_size   = 4         # reducido de 7 → 4 (menos peso en GPU integrada)
    noise       = 0.0117
    contrast    = 0.8916
    brightness  = 0.5
}

# GENERAL
general {
    no_fade_in        = true
    grace             = 0
    disable_loading   = true
}

# INPUT FIELD
input-field {
    monitor  =
    size     = 260, 45      # reducido de 300x50: más proporcional en 768p

    outline_thickness = 1
    dots_size         = 0.3
    dots_spacing      = 0.15
    dots_center       = true

    outer_color = rgb(33, 37, 46)
    inner_color = rgb(12, 11, 5)
    font_color  = rgb(254, 254, 254)

    fade_on_empty    = false
    placeholder_text = <span foreground="##961911">> </span><span>Enter Password...</span>
    hide_input       = false

    rounding = 0

    position = 0, -80       # ajustado de -100 → -80 por pantalla más chica
    halign   = center
    valign   = center
}

# CLOCK
label {
    monitor     =
    text        = $TIME
    color       = rgb(196, 199, 0)
    font_size   = 56            # reducido de 80 → 56 (en 768p el 80 ocupaba demasiado)
    font_family = Terminus
    position    = 0, 80         # ajustado de 100 → 80
    halign      = center
    valign      = center
}

# USER
label {
    monitor     =
    text        = USER: $USER
    color       = rgb(254, 254, 254)
    font_size   = 16            # reducido de 20 → 16
    font_family = Terminus
    position    = 0, 0
    halign      = center
    valign      = center
}

# CAPS LOCK INDICATOR
label {
    monitor     =
    text        = $CAPS
    color       = rgb(150, 25, 17)
    font_size   = 12            # reducido de 14 → 12
    font_family = Terminus
    position    = 0, -130       # ajustado de -160 → -130
    halign      = center
    valign      = center
}

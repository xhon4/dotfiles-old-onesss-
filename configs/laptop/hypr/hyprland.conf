# ─────────────────────────────────────────
# hyprland-ricing by occhi
# ~/.config/hypr/hyprland.conf
# ─────────────────────────────────────────
# Adapted for: 1366x768 laptop, i5-7200U


### ============================================================
### MONITOR
### ============================================================
# eDP-1 es el nombre típico del panel interno de notebook.
# Verificá con: hyprctl monitors
monitor = eDP-1, 1366x768, 0x0, 1


### ============================================================
### AUTOSTART
### ============================================================
exec-once = dunst
exec-once = waybar
exec-once = ~/.config/hypr/scripts/waybar-fullscreen.sh
exec-once = awww-daemon
exec-once = sleep 1 && awww img /home/occhi/.config/usr/share/backgrounds/y8yxlx.jpg
exec-once = hypridle
exec-once = nm-applet --indicator


### ============================================================
### INPUT
### ============================================================
input {
    follow_mouse = 1
    sensitivity  = 0
    kb_layout    = latam

    touchpad {
        natural_scroll       = true
        tap-to-click         = true
        disable_while_typing = true
    }
}


### ============================================================
### GENERAL
### ============================================================
general {
    gaps_in  = 3    # reducido de 4 → 3 para ganar espacio en 768p
    gaps_out = 6    # reducido de 8 → 6
    border_size = 1

    col.inactive_border = rgba(3d3d3dff)
    col.active_border   = rgba(c0c0c0ff)   # retro silver

    layout = dwindle
}


### ============================================================
### DECORATION
### ============================================================
decoration {
    rounding = 0

    blur {
        enabled = false
    }

    shadow {
        enabled      = true
        range        = 4            # reducido de 8 → 4 (menos carga GPU)
        render_power = 2
        color        = rgba(00000066)
    }
}


### ============================================================
### ANIMATIONS
### ============================================================
animations {
    enabled = true

    bezier = snappy, 0.25, 0.1, 0.25, 1.0

    animation = windows,    1, 2, snappy, slide    # duración reducida: 3→2
    animation = windowsOut, 1, 2, snappy, slide
    animation = fade,       1, 3, snappy            # 4→3
    animation = workspaces, 1, 3, snappy, slidevert # 4→3
}


### ============================================================
### LAYOUT — Dwindle
### ============================================================
dwindle {
    pseudotile             = false
    preserve_split         = true
    split_width_multiplier = 1.0
}


### ============================================================
### MISC
### ============================================================
misc {
    disable_hyprland_logo    = true
    disable_splash_rendering = true
    focus_on_activate        = true
    vfr                      = true   # Variable Frame Rate: baja uso de CPU en idle
                                      # muy útil en hardware más viejo
}


### ============================================================
### WORKSPACES
### ============================================================
workspace = 1, persistent:true
workspace = 2, persistent:true
workspace = 3, persistent:true
workspace = 4, persistent:true
workspace = 5, persistent:true
workspace = 6, persistent:true
workspace = 7, persistent:true
workspace = 8, persistent:true
workspace = 9, persistent:true


### ============================================================
### KEYBINDS
### ============================================================
$mod = SUPER

# --- APPS ---
bind = $mod, Return,    exec, alacritty
bind = $mod, BackSpace, exec, ~/.config/hypr/scripts/power_menu.sh
bind = $mod, A,         exec, rofi -show drun

# --- WINDOW MANAGEMENT ---
bind = $mod, Q,         killactive
bind = $mod, F,         fullscreen, 0
bind = $mod, V,         togglefloating

# Move focus
bind = $mod, H, movefocus, l
bind = $mod, J, movefocus, d
bind = $mod, K, movefocus, u
bind = $mod, L, movefocus, r

# Swap windows
bind = $mod SHIFT, H, swapwindow, l
bind = $mod SHIFT, J, swapwindow, d
bind = $mod SHIFT, K, swapwindow, u
bind = $mod SHIFT, L, swapwindow, r

# Toggle split direction
bind = $mod, I, layoutmsg, togglesplit

# Maximize (pseudo-monocle)
bind = $mod SHIFT, M, fullscreen, 1

# --- WORKSPACES ---
bind = $mod, 1, workspace, 1
bind = $mod, 2, workspace, 2
bind = $mod, 3, workspace, 3
bind = $mod, 4, workspace, 4
bind = $mod, 5, workspace, 5
bind = $mod, 6, workspace, 6
bind = $mod, 7, workspace, 7
bind = $mod, 8, workspace, 8
bind = $mod, 9, workspace, 9

# Move window to workspace
bind = $mod SHIFT, 1, movetoworkspace, 1
bind = $mod SHIFT, 2, movetoworkspace, 2
bind = $mod SHIFT, 3, movetoworkspace, 3
bind = $mod SHIFT, 4, movetoworkspace, 4
bind = $mod SHIFT, 5, movetoworkspace, 5
bind = $mod SHIFT, 6, movetoworkspace, 6
bind = $mod SHIFT, 7, movetoworkspace, 7
bind = $mod SHIFT, 8, movetoworkspace, 8
bind = $mod SHIFT, 9, movetoworkspace, 9

# --- UTILS ---
bind = $mod SHIFT, R, exec, hyprctl reload
bind = $mod SHIFT, S, exec, grim -g "$(slurp)" - | tee ~/Pictures/Screenshots/$(date +%Y-%m-%d_%H-%M-%S).png | wl-copy

# --- TOGGLE DESKTOP ---
bind = $mod, D, exec, ~/.config/hypr/scripts/toggle_desktop.sh

# --- MOUSE ---
bindm = $mod, mouse:272, movewindow
bindm = $mod, mouse:273, resizewindow

# --- BRILLO ---
bind = , XF86MonBrightnessUp,   exec, brightnessctl set 5%+
bind = , XF86MonBrightnessDown, exec, brightnessctl set 5%-

# --- AUDIO ---
bind = , XF86AudioRaiseVolume,  exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%+
bind = , XF86AudioLowerVolume,  exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bind = , XF86AudioMute,         exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle

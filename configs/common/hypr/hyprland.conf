# oxh-hyprland-dotfiles by occhi
### MONITOR ###
monitor = HDMI-A-2, 1920x1080@75.000, auto, 1

### ============================================================
### AUTOSTART
### ============================================================

exec-once = dunst

exec-once = waybar
exec-once = ~/.config/hypr/scripts/waybar-fullscreen.sh


exec-once = awww-daemon
exec-once = sleep 1 && awww img /usr/share/backgrounds/y8yxlx.jpg
exec-once = hypridle
exec-once = nm-applet --indicator
exec-once = ~/.config/hypr/scripts/gcal-sync.sh


### ============================================================
### INPUT
### ============================================================
input {
    follow_mouse = 1
    sensitivity = 0
    kb_layout = latam
}


### ============================================================
### GENERAL
### ============================================================
general {
    gaps_in = 4
    gaps_out = 8
    border_size = 1

    col.inactive_border = rgba(3d3d3dff)
    col.active_border   = rgba(c0c0c0ff)

    layout = dwindle
}


### ============================================================
### DECORATION
### ============================================================
decoration {
    rounding = 0

    blur {
        enabled = false
    }

    shadow {
        enabled = true
        range = 8
        render_power = 2
        color = rgba(00000088)
    }
}


### ============================================================
### ANIMATIONS
### ============================================================
animations {
    enabled = true

    bezier = snappy, 0.25, 0.1, 0.25, 1.0

    animation = windows,     1, 3,  snappy, slide
    animation = windowsOut,  1, 3,  snappy, slide
    animation = fade,        1, 4,  snappy
    animation = workspaces,  1, 4,  snappy, slidevert
}


### ============================================================
### LAYOUT — Dwindle
### ============================================================
dwindle {
    pseudotile        = false
    preserve_split    = true
    split_width_multiplier = 1.0    # ≈ split_ratio 0.5
}


### ============================================================
### MISC
### ============================================================
misc {
    disable_hyprland_logo = true
    disable_splash_rendering = true
    focus_on_activate = true
}


### ============================================================
### WORKSPACES (I–IX → 1–9)
### ============================================================
workspace = 1, persistent:true
workspace = 2, persistent:true
workspace = 3, persistent:true
workspace = 4, persistent:true
workspace = 5, persistent:true
workspace = 6, persistent:true
workspace = 7, persistent:true
workspace = 8, persistent:true
workspace = 9, persistent:true


### ============================================================
### KEYBINDS
### ============================================================
$mod = SUPER

# --- APPS ---
bind = $mod, Return,    exec, alacritty
bind = $mod, BackSpace, exec, ~/.config/hypr/scripts/power_menu.sh
bind = $mod, period, exec, ~/.config/rofi/scripts/emote-picker.sh
bind = $mod, A,         exec, rofi -show drun

# --- WINDOW MANAGEMENT ---
bind = $mod, Q,         killactive
bind = $mod, F,         fullscreen, 0
bind = $mod, V,         togglefloating
bind = $mod, V, resizeactive, exact 800 600

# Move focus
bind = $mod, H, movefocus, l
bind = $mod, J, movefocus, d
bind = $mod, K, movefocus, u
bind = $mod, L, movefocus, r

# Swap windows
bind = $mod SHIFT, H, swapwindow, l
bind = $mod SHIFT, J, swapwindow, d
bind = $mod SHIFT, K, swapwindow, u
bind = $mod SHIFT, L, swapwindow, r

bind = $mod, I, layoutmsg, togglesplit

bind = $mod SHIFT, M, fullscreen, 1

# --- WORKSPACES ---
bind = $mod, 1, workspace, 1
bind = $mod, 2, workspace, 2
bind = $mod, 3, workspace, 3
bind = $mod, 4, workspace, 4
bind = $mod, 5, workspace, 5
bind = $mod, 6, workspace, 6
bind = $mod, 7, workspace, 7
bind = $mod, 8, workspace, 8
bind = $mod, 9, workspace, 9

# Move window to workspace
bind = $mod SHIFT, 1, movetoworkspace, 1
bind = $mod SHIFT, 2, movetoworkspace, 2
bind = $mod SHIFT, 3, movetoworkspace, 3
bind = $mod SHIFT, 4, movetoworkspace, 4
bind = $mod SHIFT, 5, movetoworkspace, 5
bind = $mod SHIFT, 6, movetoworkspace, 6
bind = $mod SHIFT, 7, movetoworkspace, 7
bind = $mod SHIFT, 8, movetoworkspace, 8
bind = $mod SHIFT, 9, movetoworkspace, 9

# --- RELOAD ---

bind = $mod SHIFT, R, exec, hyprctl reload
bind = $mod SHIFT, S, exec, grim -g "$(slurp)" - | tee ~/Pictures/Screenshots/$(date +%Y-%m-%d_%H-%M-%S).png | wl-copy

bind = $mod, D, exec, ~/.config/hypr/scripts/toggle_desktop.sh

bindm = $mod, mouse:272, movewindow
bindm = $mod, mouse:273, resizewindow

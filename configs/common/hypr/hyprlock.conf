# oxh-hyprland-dotfiles by occhi

# BACKGROUND
background {
    monitor =
    path = /usr/share/backgrounds/y8yxlx.jpg
    color = rgb(12, 11, 5)
    
    blur_passes = 1 
    blur_size = 7
    noise = 0.0117
    contrast = 0.8916
    brightness = 0.5
}

# GENERAL
general {
    no_fade_in = true
    grace = 0
    disable_loading = true
}

# INPUT FIELD (Password Box)
input-field {
    monitor =
    size = 300, 50
    outline_thickness = 1
    dots_size = 0.3
    dots_spacing = 0.15
    dots_center = true
    
    outer_color = rgb(33, 37, 46)
    inner_color = rgb(12, 11, 5)
    font_color = rgb(254, 254, 254)
    
    fade_on_empty = false
    placeholder_text = <span foreground="##961911">> </span><span>Enter Password...</span>
    hide_input = false
    
    rounding = 0
    
    position = 0, -100
    halign = center
    valign = center
}

# TIME (Clock)
label {
    monitor =
    text = $TIME
    color = rgb(196, 199, 0)
    font_size = 80
    font_family = Terminus
    position = 0, 100
    halign = center
    valign = center
}

# USER (Greeting)
label {
    monitor =
    text = USER: $USER
    color = rgb(254, 254, 254)
    font_size = 20
    font_family = Terminus
    position = 0, 0
    halign = center
    valign = center
}

# CAPS LOCK INDICATOR
label {
    monitor =
    text = $CAPS
    color = rgb(150, 25, 17)
    font_size = 14
    font_family = Terminus
    position = 0, -160
    halign = center
    valign = center
}
# ~/.config/hypr/hypridle.conf
# Dependencies: hypridle, playerctl
# Installation:  pacman -S hypridle playerctl

general {
    lock_cmd = none                  # replace with your locker if you want
    before_sleep_cmd = hyprctl dispatch dpms off
    after_sleep_cmd  = hyprctl dispatch dpms on
    ignore_dbus_inhibit = false      # respect inhibitors (e.g., mpv, obs)
}

listener {
    timeout  = 300                   # 5 minutes — same as the original script
    on-timeout = bash -c 'playerctl status 2>/dev/null | grep -q Playing || hyprctl dispatch dpms off'
    on-resume  = hyprctl dispatch dpms on
}
